name: Test Backend

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Seed .env for CI
        run: cp .env.example .env
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: latest
      - name: Start Supabase auth stack
        # supabase/config.toml disables studio/realtime/storage/edge-runtime/
        # analytics; .env (seeded from .env.example) carries the CLI's
        # well-known demo keys, so no `supabase status` export is needed.
        run: supabase start
      - run: docker compose down -v --remove-orphans
      - run: docker compose up -d --wait db mailcatcher minio
      - name: Migrate DB
        run: uv run bash scripts/prestart.sh
        working-directory: backend
      - name: Run tests
        run: uv run bash scripts/tests-start.sh "Coverage for ${{ github.sha }}"
        working-directory: backend
        env:
          # tests run on the runner host; the compose-internal hostname
          # http://minio:9000 from .env is not resolvable there
          MINIO_ENDPOINT: http://localhost:9000
      - run: docker compose down -v --remove-orphans
      - name: Store coverage files
        uses: actions/upload-artifact@v7
        with:
          name: coverage-html
          path: backend/htmlcov
          include-hidden-files: true
      - name: Coverage report
        run: uv run coverage report --fail-under=90
        working-directory: backend
