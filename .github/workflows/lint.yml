name: Lint

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync
        working-directory: backend
      - run: uv run ruff check .
        working-directory: backend
      - run: uv run ruff format --check .
        working-directory: backend
      - run: uv run mypy app
        working-directory: backend

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      # Workspace root install: frontend deps are hoisted to the root lockfile
      - run: bun install --frozen-lockfile
      - run: bunx biome ci ./
        working-directory: frontend
      - run: bunx tsc --noEmit
        working-directory: frontend
      # e2e/ is a workspace member too — same install covers it
      - run: bunx biome ci ./
        working-directory: e2e
      - run: bunx tsc --noEmit
        working-directory: e2e

  lint-mobile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
        working-directory: mobile
      - run: bun run typecheck
        working-directory: mobile
      - run: bunx biome ci ./
        working-directory: mobile
      # jest-expo unit tests (bun run test → jest; bun's own `bun test` is NOT used)
      - run: bun run test
        working-directory: mobile

  # https://github.com/marketplace/actions/alls-green#why
  alls-green-lint:  # This job does nothing and is only used for the branch protection
    if: always()
    needs:
      - lint-backend
      - lint-frontend
      - lint-mobile
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
