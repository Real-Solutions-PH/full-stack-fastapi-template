services:

  db:
    restart: "no"
    ports:
      - "5432:5432"

  redis:
    restart: "no"
    ports:
      - "6379:6379"

  minio:
    restart: "no"
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    # TODO: remove once coverage is done locally
    volumes:
      - ./backend/htmlcov:/app/backend/htmlcov
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  frontend:
    restart: "no"
    ports:
      - "3000:3000"
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    # The Next.js middleware (server-side, in-container) reaches the
    # host-local Supabase stack via host.docker.internal, while the browser
    # (on the host) keeps the NEXT_PUBLIC_* 127.0.0.1 URL from .env.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-http://127.0.0.1:54321}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_URL: http://host.docker.internal:54321
    develop:
      watch:
        - path: ./frontend
          action: sync
          target: /app/frontend
          ignore:
            - ./frontend/node_modules
            - ./frontend/.next
        - path: ./frontend/package.json
          action: rebuild
        - path: ./bun.lock
          action: rebuild

  playwright:
    build:
      context: .
      dockerfile: frontend/Dockerfile.playwright
      args:
        - NEXT_PUBLIC_API_URL=http://backend:8000
        - NODE_ENV=production
    ipc: host
    depends_on:
      - backend
      - mailcatcher
    env_file:
      - .env
    # Both the dev server and the browser run inside this container, so
    # host.docker.internal works for every Supabase URL; Mailpit is the
    # local Supabase stack's email catcher (auth emails, port 54324).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_SUPABASE_URL=http://host.docker.internal:54321
      # Override the 127.0.0.1 value inherited from env_file (.env).
      - SUPABASE_URL=http://host.docker.internal:54321
      - MAILPIT_HOST=http://host.docker.internal:54324
      # For the reports when run locally
      - PLAYWRIGHT_HTML_HOST=0.0.0.0
      - CI=${CI:-}
    volumes:
      - ./frontend/blob-report:/app/frontend/blob-report
