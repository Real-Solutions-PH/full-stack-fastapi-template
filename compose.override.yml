services:

  db:
    restart: "no"
    ports:
      - "5432:5432"

  redis:
    restart: "no"
    ports:
      - "6379:6379"

  minio:
    restart: "no"
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    restart: "no"
    ports:
      - "8000:8000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    # command: sleep infinity  # Infinite loop to keep container alive doing nothing
    command:
      - fastapi
      - run
      - --reload
      - "app/main.py"
    develop:
      watch:
        - path: ./backend
          action: sync
          target: /app/backend
          ignore:
            - ./backend/.venv
            - .venv
        - path: ./backend/pyproject.toml
          action: rebuild
    # TODO: remove once coverage is done locally
    volumes:
      - ./backend/htmlcov:/app/backend/htmlcov
    environment:
      SMTP_HOST: "mailcatcher"
      SMTP_PORT: "1025"
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: "noreply@example.com"

  # Catches the BACKEND's app-notification SMTP emails only (SMTP_HOST above).
  # Auth emails (signup/recovery) are sent by Supabase GoTrue and land in the
  # local Supabase stack's Mailpit (http://127.0.0.1:54324) — the E2E suite
  # reads those from Mailpit, not from here.
  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  frontend:
    restart: "no"
    ports:
      - "3000:3000"
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    # The Next.js middleware (server-side, in-container) reaches the
    # host-local Supabase stack via host.docker.internal, while the browser
    # (on the host) keeps the NEXT_PUBLIC_* 127.0.0.1 URL from .env.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL:-http://127.0.0.1:54321}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_URL: http://host.docker.internal:54321
    develop:
      watch:
        - path: ./frontend
          action: sync
          target: /app/frontend
          ignore:
            - ./frontend/node_modules
            - ./frontend/.next
        - path: ./frontend/package.json
          action: rebuild
        - path: ./bun.lock
          action: rebuild

  cypress:
    profiles:
      - e2e
    build:
      context: .
      dockerfile: e2e/Dockerfile
    ipc: host
    depends_on:
      - backend
      - frontend
    # The frontend image bakes browser-facing URLs for a HOST browser
    # (NEXT_PUBLIC_API_URL=http://localhost:8000, Supabase on
    # 127.0.0.1:54321), so the Cypress browser must see the stack exactly
    # like the host does: host networking makes the published ports
    # (frontend :3000, backend :8000, Supabase :54321, Mailpit :54324)
    # reachable on localhost. Linux-only (fine: CI runners + `cypress open`
    # on macOS runs from the host, not this container).
    network_mode: host
    env_file:
      - .env
    environment:
      - CYPRESS_BASE_URL=http://localhost:3000
      - CYPRESS_API_URL=http://localhost:8000
      - CYPRESS_MAILPIT_HOST=http://127.0.0.1:54324
      - CI=${CI:-}
    volumes:
      - ./e2e/cypress/screenshots:/e2e/cypress/screenshots
